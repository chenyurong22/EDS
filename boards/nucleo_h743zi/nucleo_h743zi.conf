# =============================================================================
# Xaloqi EDS
# boards/nucleo_h743zi/nucleo_h743zi.conf
#
# STM32H743ZI-specific Kconfig additions for the NUCLEO-H743ZI2 board.
# Merged on top of examples/basic_ecu/prj.conf by Zephyr CMake.
#
# =============================================================================
# FIX HISTORY — cumulative (apply all at once)
# =============================================================================
#
# ── Symbols removed and why ──────────────────────────────────────────────────
#
#  CONFIG_SOC_SERIES_STM32H7X / CONFIG_CLOCK_CONTROL_STM32_CUBE
#    Hidden (prompt-less) symbols. Zephyr 3.7 aborts when a .conf file assigns
#    a value to a non-user-configurable symbol. Auto-selected by defconfig.
#
#  CONFIG_FDCAN_STM32
#    Does not exist in Zephyr 3.7 (consolidated into CAN_STM32FD).
#
#  CONFIG_CAN_STM32FD
#    DT-gated: depends on DT_HAS_ST_STM32_FDCAN_ENABLED, which is only
#    available after the devicetree compiler runs — after .conf files are
#    parsed. Kconfig sees it as undefined. Auto-selected by the fdcan1 DTS
#    node in the overlay.
#
#  CONFIG_STM32_HSE_CLOCK
#    Removed from Kconfig in Zephyr 3.x. Clock source moved to DTS
#    (crystal-frequency on clk_hse node). Setting it triggers "undefined symbol".
#
#  CONFIG_WDT_STM32_IWDG
#    DT-gated: depends on DT_HAS_ST_STM32_IWDG_ENABLED (same pattern as
#    CAN_STM32FD). Auto-selected by the iwdg DTS node in the overlay.
#
#  CONFIG_BUILTIN_STACK_GUARD
#    Depends on CPU_CORTEX_M_HAS_SPLIM. The SPLIM (Stack Pointer Limit)
#    register was introduced in ARMv8-M (Cortex-M33/M55). The STM32H743ZI
#    uses a Cortex-M7 (ARMv7-M), which does NOT implement SPLIM.
#    CPU_CORTEX_M_HAS_SPLIM=n for all M7 targets — this symbol can never
#    be enabled. CI log: "BUILTIN_STACK_GUARD got n: CPU_CORTEX_M_HAS_SPLIM (=n)"
#
# ── Symbols ADDED ─────────────────────────────────────────────────────────────
#
#  CONFIG_STACK_SENTINEL=n
#    prj.conf sets STACK_SENTINEL=y for targets without a hardware stack guard.
#    However, CONFIG_ARM_MPU=y (kept below — the Cortex-M7 has a 16-region MPU)
#    causes MPU_STACK_GUARD to be selected, because in Zephyr 3.7:
#
#        config MPU_STACK_GUARD
#            bool
#            select ARM_MPU if ARM
#
#    ARM_MPU=y → MPU_STACK_GUARD=y. STACK_SENTINEL depends on !MPU_STACK_GUARD.
#    When MPU_STACK_GUARD=y, STACK_SENTINEL cannot be set — Kconfig warns:
#    "STACK_SENTINEL got n: (!MPU_STACK_GUARD) (=n)"
#    CI log confirms: "warning: STACK_SENTINEL assigned y but got n."
#    Fix: override STACK_SENTINEL=n in this board file. The MPU provides a
#    superior hardware-enforced guard; the software sentinel is redundant.
#
#  CONFIG_STACK_CANARIES=n  (FIX — new, RC-KCONF-1)
#    prj.conf sets STACK_CANARIES=y. This symbol depends on:
#      ENTROPY_GENERATOR || TEST_RANDOM_GENERATOR
#    ENTROPY_GENERATOR on STM32H743ZI requires a DTS-enabled RNG peripheral
#    node (st,stm32-rng) with CONFIG_ENTROPY_GENERATOR=y. Without an explicit
#    RNG DTS node in the overlay, ENTROPY_GENERATOR=n and the Kconfig
#    dependency fails silently, generating:
#      "warning: STACK_CANARIES assigned y but got n"
#    The board already enables ARM_MPU → MPU_STACK_GUARD, which is a superior
#    hardware-based stack protection mechanism. Software canaries are redundant
#    on hardware with MPU stack guard active. Override to =n to suppress the
#    warning. For production: add the STM32H743 RNG DTS node and set
#    CONFIG_ENTROPY_GENERATOR=y, then remove this override.
#
# =============================================================================

# --- CAN / FDCAN driver ------------------------------------------------------
# CONFIG_CAN_STM32FD must NOT be set in this .conf file.
# In Zephyr 3.7, CAN_STM32FD has no user-visible prompt (it is a hidden symbol).
# Assigning it from a .conf file triggers:
#   "attempt to assign the value 'y' to the undefined symbol CAN_STM32FD"
#   "error: Aborting due to Kconfig warnings"
# The driver is auto-selected exclusively via DT: when fdcan1 has status="okay"
# in the overlay, DT_HAS_ST_STM32_FDCAN_ENABLED=y is set, which causes
# CAN_STM32FD to select itself via its own 'default y depends on' rule.
# The overlay is applied via -DDTC_OVERLAY_FILE in ci.yml. No explicit line here.

# --- UART3 for ST-Link virtual COM logging -----------------------------------
CONFIG_SERIAL=y
CONFIG_UART_STM32=y
CONFIG_LOG_BACKEND_UART=y

# --- LOG_MODE_DEFERRED -------------------------------------------------------
# prj.conf sets LOG_BUFFER_SIZE=2048; that symbol depends on LOG_MODE_DEFERRED.
CONFIG_LOG_MODE_DEFERRED=y

# --- Hardware watchdog -------------------------------------------------------
# WATCHDOG enables the Zephyr WDT subsystem. The STM32 IWDG driver is
# auto-selected from DTS — WDT_STM32_IWDG must NOT be set here (DT-gated).
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n

# --- ARM MPU -----------------------------------------------------------------
# The Cortex-M7 on STM32H743ZI has a standard 16-region MPU.
# ARM_MPU is user-visible and correctly settable. Note: BUILTIN_STACK_GUARD
# is intentionally absent (requires CPU_CORTEX_M_HAS_SPLIM, absent on M7).
CONFIG_ARM_MPU=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# --- Override STACK_SENTINEL -------------------------------------------------
# ARM_MPU=y selects MPU_STACK_GUARD, which conflicts with STACK_SENTINEL.
# Disable STACK_SENTINEL explicitly so prj.conf's =y does not generate a
# warning (non-fatal but noisy) on every build.
CONFIG_STACK_SENTINEL=n

# --- Override STACK_CANARIES -------------------------------------------------
# prj.conf enables STACK_CANARIES=y. On STM32H743ZI this requires
# ENTROPY_GENERATOR=y, which in turn requires a DTS-enabled RNG node
# (st,stm32-rng). No RNG node is present in the current overlay.
# Without ENTROPY_GENERATOR the Kconfig dependency fails and Kconfig emits:
#   "warning: STACK_CANARIES assigned y but got n"
# ARM_MPU + MPU_STACK_GUARD (enabled above) provides equivalent hardware-level
# stack protection. Override to =n to suppress the spurious Kconfig warning.
# TODO: Add STM32H743 RNG DTS node to overlay, set ENTROPY_GENERATOR=y, and
#       remove this override to re-enable software canaries.
CONFIG_STACK_CANARIES=n

# --- Entropy / TRNG (required for Phase 1 AES-CMAC seed generation) ----------
# The STM32H743ZI has a hardware RNG peripheral. Enabling ENTROPY_GENERATOR
# links the st,stm32-rng driver so that DEVICE_DT_GET(DT_CHOSEN(zephyr_entropy))
# in main.c resolves correctly at link time.
# FIX (Phase 1 CI): Without this, DT_HAS_CHOSEN(zephyr_entropy)=1 (set by the
#   built-in board DTS) but the entropy driver object was absent from the link,
#   causing: undefined reference to __device_dts_ord_81.
# The RNG DTS node (&rng { status="okay"; }) is added in nucleo_h743zi.overlay.
# Remove the STACK_CANARIES=n override below once this is validated.
CONFIG_ENTROPY_GENERATOR=y

# --- Flash + NVS (required by platform/nvm_store.c) --------------------------
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# --- Larger log buffer for UART backend on real hardware ---------------------
CONFIG_LOG_BUFFER_SIZE=4096
