# =============================================================================
# Xaloqi EDS
# boards/native_sim/native_sim.conf
#
# native_sim-specific Kconfig overrides. Merged on top of prj.conf by
# Zephyr CMake at configure time. Values here take precedence over prj.conf
# for the native_sim target only. prj.conf remains the authoritative
# hardware ECU configuration for nucleo_h743zi and other real targets.
#
# FIX: This file adds overrides for 6 Kconfig symbols that cause
# "error: Aborting due to Kconfig warnings" on native_sim. Zephyr 3.7
# promotes Kconfig assignment failures (value assigned to a symbol whose
# dependency is unsatisfied) into fatal errors. Each symbol below has an
# unsatisfied dependency on the native_sim platform:
#
#   CONFIG_STACK_CANARIES=y  — depends on ENTROPY_GENERATOR||TEST_RANDOM_GENERATOR
#     native_sim has no hardware RNG and neither is enabled in its defconfig.
#     Override: STACK_CANARIES=n (stack canaries are meaningless in simulation)
#
#   CONFIG_CAN_STATS=y       — depends on STATS
#     The STATS subsystem is not enabled in the native_sim defconfig.
#     Override: CAN_STATS=n
#
#   CONFIG_LOG_BUFFER_SIZE=2048  — depends on LOG_MODE_DEFERRED
#     native_sim defaults to LOG_MODE_MINIMAL (synchronous, no buffer).
#     Override: LOG_MODE_DEFERRED=y (enables the buffer, fully supported on sim)
#
#   CONFIG_LOG_BACKEND_UART=y  — depends on UART_CONSOLE
#     native_sim has no UART peripheral. Log output uses the native POSIX
#     backend (stdout). Override: LOG_BACKEND_UART=n + LOG_BACKEND_NATIVE_POSIX=y
#
#   CONFIG_NEWLIB_LIBC=y  — choice conflict with PICOLIBC
#     Zephyr 3.7 changed the native_sim default C library from newlib to
#     picolibc. Both are exclusive choices. The defconfig's picolibc wins,
#     generating a warning. Override: NEWLIB_LIBC=y forces newlib consistent
#     with prj.conf intent (newlib is fully supported on native_sim).
#
#   CONFIG_MUTEX_SPIN_ON_OWNER — undefined symbol (removed in Zephyr 3.x)
#     Fixed in prj.conf by removing the assignment entirely.
# =============================================================================

# --- Virtual CAN loopback (native_sim has no physical CAN) ---
CONFIG_CAN_LOOPBACK=y

# --- POSIX API (required for native_sim threading and timers) ---
CONFIG_POSIX_API=y

# --- FIX W1: STACK_CANARIES (no entropy source on native_sim) ---
CONFIG_STACK_CANARIES=n

# --- FIX W2: CAN_STATS (STATS subsystem not enabled on native_sim) ---
CONFIG_CAN_STATS=n

# --- FIX W3: LOG_BUFFER_SIZE requires LOG_MODE_DEFERRED ---
CONFIG_LOG_MODE_DEFERRED=y

# --- FIX W4: LOG_BACKEND_UART (no UART on native_sim, use POSIX stdout) ---
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BACKEND_NATIVE_POSIX=y

# --- FIX W5: NEWLIB_LIBC choice conflict (force newlib over picolibc default) ---
CONFIG_NEWLIB_LIBC=y

# --- Platform adjustments ---
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_WATCHDOG=n
