# =============================================================================
# Xaloqi EDS
# examples/basic_ecu_doip/boards/native_sim/native_sim_doip.conf
#
# native_sim-specific overrides for the DoIP example ECU.
#
# FIXES applied vs original:
#   - ETH_NATIVE_POSIX removed: dependency chain on native_sim changed in
#     Zephyr 3.7; the symbol ends up 'n' regardless. NET_LOOPBACK=y is
#     sufficient for 127.0.0.1 integration tests on native_sim.
#   - NEWLIB_LIBC=y removed: Zephyr 3.7 changed the native_sim default C
#     library to picolibc. Both are exclusive choices — trying to force
#     NEWLIB_LIBC=y generates a "choice symbol ... ended up as PICOLIBC"
#     fatal warning. picolibc is fully compatible with the EDS stack.
#   - NET_DRIVERS removed: not needed when only using loopback.
# =============================================================================

# --- POSIX API required for native_sim networking ---
CONFIG_POSIX_API=y

# --- native_sim loopback networking (sufficient for 127.0.0.1 tests) ---
CONFIG_NET_LOOPBACK=y
CONFIG_NET_NATIVE=y

# --- Log via POSIX stdout (no UART on native_sim) ---
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BACKEND_NATIVE_POSIX=y

# --- No stack canaries on native_sim (no entropy source) ---
CONFIG_STACK_CANARIES=n

# --- Reduce log noise in CI ---
CONFIG_LOG_DEFAULT_LEVEL=2

# --- No watchdog on simulator ---
CONFIG_WATCHDOG=n
