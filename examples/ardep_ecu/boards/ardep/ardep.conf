# =============================================================================
# Xaloqi EDS
# examples/ardep_ecu/boards/ardep/ardep.conf
#
# ARDEP-specific Kconfig overrides, merged on top of prj.conf at build time.
#
# The ARDEP board is based on a STM32G4-series MCU. This file enables the
# FDCAN driver and configures board-specific options not present in prj.conf.
# =============================================================================

# --- FDCAN driver (STM32G4 uses FDCAN, not the legacy bxCAN peripheral) ---
CONFIG_CAN=y
CONFIG_CAN_STM32FD=y
CONFIG_CAN_INIT_PRIORITY=80
CONFIG_CAN_STATS=y

# --- Log output: ARDEP has a UART console via on-board debugger ---
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y

# --- ARDEP hardware watchdog (on-board IWDG) ---
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n

# --- Stack canaries: supported on Cortex-M4 with entropy (STM32G4 RNG) ---
CONFIG_STACK_CANARIES=y
CONFIG_ENTROPY_GENERATOR=y

# --- NVS flash (STM32G4 has internal flash for NVM-backed DTC storage) ---
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# --- MCUboot-compatible image format (ARDEP uses MCUboot for DFU) ---
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE=""
