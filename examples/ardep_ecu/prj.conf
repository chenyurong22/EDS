# =============================================================================
# Xaloqi EDS
# examples/ardep_ecu/prj.conf
#
# Base project configuration — applies to all board targets.
# Board-specific overrides: boards/ardep/ardep.conf
#
# PURPOSE: ARDEP I/O Controller ECU — automotive diagnostics base config.
# =============================================================================

# --- CAN driver base ---
CONFIG_CAN=y
CONFIG_CAN_INIT_PRIORITY=80
CONFIG_STATS=y

# --- Kernel / threading ---
CONFIG_MULTITHREADING=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_NAME=y

# --- Tick rate: 1 ms required for ISO-TP timer accuracy ---
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_TICKLESS_KERNEL=n

# --- Watchdog ---
CONFIG_WATCHDOG=y
CONFIG_DIAG_WDT_WINDOW_MS=100

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=2048

# --- Safety hardening ---
CONFIG_ASSERT=y
CONFIG_STACK_SENTINEL=y

# --- C library ---
CONFIG_NEWLIB_LIBC=y

# --- No heap (MISRA-21.3 / ASIL-B) ---
CONFIG_HEAP_MEM_POOL_SIZE=0

# --- UDS stack timing parameters ---
CONFIG_UDS_SESSION_S3_TIMEOUT_MS=5000
CONFIG_ISOTP_TIMEOUT_CR_MS=150
CONFIG_ISOTP_TIMEOUT_BS_MS=75
CONFIG_ISOTP_TIMEOUT_AS_MS=25

# --- Diagnostics task stack ---
# ARDEP I/O controller has 35 DIDs; increased stack for larger handler table
CONFIG_DIAG_TASK_STACK_SIZE=6144
CONFIG_DIAG_TASK_PRIORITY=5

# --- Build output ---
CONFIG_BUILD_OUTPUT_BIN=y
CONFIG_BUILD_OUTPUT_HEX=y
