# =============================================================================
# Xaloqi EDS
# examples/basic_ecu/prj.conf
#
# Base project configuration — applies to ALL board targets.
# Board-specific overrides live in boards/<board>/<board>.conf.
#
# FIX: Removed CONFIG_MUTEX_SPIN_ON_OWNER=n.
#   This Kconfig symbol was removed from the Zephyr kernel in Zephyr 3.x.
#   Any attempt to assign a value to an undefined symbol triggers:
#     "attempt to assign the value 'n' to the undefined symbol MUTEX_SPIN_ON_OWNER"
#   Zephyr 3.7 treats this as a fatal Kconfig error, aborting the CMake
#   configure step with "error: Aborting due to Kconfig warnings".
#   The symbol does not exist on any platform in Zephyr 3.7.
# =============================================================================

# --- CAN driver ---
CONFIG_CAN=y
CONFIG_CAN_INIT_PRIORITY=80
CONFIG_STATS=y
CONFIG_CAN_STATS=y

# --- Kernel / threading ---
CONFIG_MULTITHREADING=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

# --- Tick rate: 1 ms required for ISO-TP timer accuracy ---
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_TICKLESS_KERNEL=n

# --- Watchdog ---
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n
CONFIG_DIAG_WDT_WINDOW_MS=100

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BUFFER_SIZE=2048

# --- Safety hardening ---
CONFIG_ASSERT=y
CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y

# --- C library ---
CONFIG_NEWLIB_LIBC=y

# --- No heap (MISRA-21.3) ---
CONFIG_HEAP_MEM_POOL_SIZE=0

# --- UDS stack parameters ---
CONFIG_UDS_SESSION_S3_TIMEOUT_MS=5000
CONFIG_ISOTP_TIMEOUT_CR_MS=150
CONFIG_ISOTP_TIMEOUT_BS_MS=75
CONFIG_ISOTP_TIMEOUT_AS_MS=25

# --- Diagnostics task ---
CONFIG_DIAG_TASK_STACK_SIZE=4096
CONFIG_DIAG_TASK_PRIORITY=5

# --- Build output ---
CONFIG_BUILD_OUTPUT_BIN=y
CONFIG_BUILD_OUTPUT_HEX=y
