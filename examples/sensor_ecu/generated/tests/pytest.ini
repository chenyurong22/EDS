# =============================================================================
# GENERATED — do NOT edit manually.
# pytest configuration for generated/tests/
# =============================================================================
[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    hil:      Hardware-in-loop test (requires real ECU on CAN bus)
    firmware: Firmware-backed test (builds and runs harness binary)
    slow:     Test takes > 5 seconds
log_cli = true
log_cli_level = WARNING
