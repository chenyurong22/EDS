# examples/sensor_ecu/boards/native_sim/native_sim.conf
# native_sim-specific Kconfig overrides for the SensorECU example.

# Disable real NVS flash (not present on native_sim)
CONFIG_NVS=n
CONFIG_FLASH=n
CONFIG_FLASH_MAP=n

# Use loopback CAN
CONFIG_CAN_LOOPBACK=y

# Disable watchdog (not present on native_sim)
CONFIG_WATCHDOG=n

# Sensor stub drivers (native_sim simulation only)
# If these symbols are not available in your Zephyr version, the
# sensor_monitor thread will degrade gracefully (no sensor readings,
# DIDs return "unavailable" values).
CONFIG_SENSOR=y
