# =============================================================================
# Xaloqi EDS
# examples/basic_ecu_doip/prj.conf
#
# Base project configuration for the DoIP example ECU.
# Board-specific overrides in boards/native_sim/native_sim_doip.conf.
#
# FIXES applied vs original:
#   - DOIP_STACK_SIZE / DOIP_THREAD_PRIORITY removed: these are #define
#     constants in zephyr_lwip.c, not Kconfig symbols. Assigning them here
#     produces "attempt to assign the value to the undefined symbol" fatal
#     Kconfig errors on Zephyr 3.7.
#   - CONFIG_NET_SOCKETS_POSIX_NAMES removed: this symbol depends on
#     (!POSIX_API). native_sim_doip.conf sets POSIX_API=y, which makes
#     POSIX_NAMES=y an unsatisfied dependency. With POSIX_API, zsock_*
#     functions are available as plain socket/poll/send/recv — no POSIX_NAMES
#     wrapper needed.
# =============================================================================

# --- Kernel / threading ---
CONFIG_MULTITHREADING=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

# --- Tick rate ---
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_TICKLESS_KERNEL=n

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# --- Safety hardening ---
CONFIG_ASSERT=y

# --- No heap (MISRA-21.3) ---
CONFIG_HEAP_MEM_POOL_SIZE=0

# --- Networking ---
# NET_SOCKETS_POSIX_NAMES intentionally omitted: conflicts with POSIX_API=y.
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IF_MAX_IPV4_COUNT=1
CONFIG_NET_MAX_CONN=8
CONFIG_NET_TCP_MAX_SEND_WINDOW_SIZE=4096
CONFIG_POSIX_MAX_FDS=16

# --- Build output ---
CONFIG_BUILD_OUTPUT_BIN=y
