# =============================================================================
# Xaloqi EDS
# examples/basic_ecu_doip/boards/native_sim/native_sim_doip.conf
#
# native_sim-specific overrides for the DoIP example ECU.
# Mirrors the networking overrides from native_sim/native_sim.conf in
# the main EDS repo, scoped to the DoIP example.
# =============================================================================

# --- POSIX API required for native_sim networking ---
CONFIG_POSIX_API=y

# --- native_sim loopback networking ---
CONFIG_NET_LOOPBACK=y
CONFIG_NET_NATIVE=y

# --- Log via POSIX stdout (no UART on native_sim) ---
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BACKEND_NATIVE_POSIX=y

# --- No stack canaries on native_sim (no entropy) ---
CONFIG_STACK_CANARIES=n

# --- Force newlib (consistent with rest of EDS) ---
CONFIG_NEWLIB_LIBC=y

# --- Networking: enable native posix Ethernet ---
CONFIG_NET_DRIVERS=y
CONFIG_ETH_NATIVE_POSIX=y

# --- Reduce log noise in CI ---
CONFIG_LOG_DEFAULT_LEVEL=2

# --- No watchdog on simulator ---
CONFIG_WATCHDOG=n
