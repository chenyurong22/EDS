# =============================================================================
# Xaloqi EDS
# examples/bms_ecu/boards/native_sim/native_sim.conf
#
# native_sim board-specific Kconfig overrides for the BMS example.
#
# This file is included in addition to prj.conf when building for native_sim.
# It enables the CAN loopback driver and suppresses hardware-specific
# Kconfig options that are not available on the simulation target.
# =============================================================================

# Enable the software CAN loopback driver (no real CAN hardware needed)
CONFIG_CAN_LOOPBACK=y

# Disable stack canaries on native_sim: depends on ENTROPY_GENERATOR which
# is not present on native_sim. Hardware stack protection is not relevant here.
CONFIG_STACK_CANARIES=n
