# examples/safeboot_ecu/boards/nucleo_h743zi/nucleo_h743zi.conf
#
# STM32H743ZI board config for SafeBootECU — extends base nucleo conf.
# Adds MCUboot bootloader requirements on top of the standard board config.

# --- From base nucleo config (required for this board) ---
CONFIG_SERIAL=y
CONFIG_UART_STM32=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n
CONFIG_ARM_MPU=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_STACK_SENTINEL=n
CONFIG_STACK_CANARIES=n
CONFIG_ENTROPY_GENERATOR=y
CONFIG_LOG_BUFFER_SIZE=4096

# --- Flash map (required by zephyr_flash_ops.c and nvm_store.c) ---
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# --- MCUboot secondary slot write support ---
# flash_area_write() requires this to allow writes to non-erase-aligned offsets.
# Zephyr 3.7: STM32H743 flash requires 256-bit (32-byte) aligned writes.
# CONFIG_FLASH_PAGE_LAYOUT=y is auto-selected with CONFIG_FLASH=y on STM32.
CONFIG_FLASH_PAGE_LAYOUT=y
